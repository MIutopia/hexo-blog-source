# Hexo Fluid Theme Config
# See: https://hexo.fluid-dev.com/docs/

# 导航栏
navbar:
  blog_title: MIutopia
  menu:
    - { key: '首页', link: '/', icon: 'iconfont icon-home-fill' }
    - { key: '技术博客', link: '/archives/', icon: 'iconfont icon-archive-fill' }
    - { key: '分类', link: '/categories/', icon: 'iconfont icon-category-fill' }
    - { key: '标签', link: '/tags/', icon: 'iconfont icon-tags-fill' }
    - { key: '关于我', link: '/about/', icon: 'iconfont icon-user-fill' }

# 首页 Banner
index:
  banner_img: /images/hero/01.jpg
  banner_img_height: 70
  slogan:
    enable: true
    text: "MIutopia's Blog — 云原生 & DevOps 技术笔记"
  auto_excerpt:
    enable: true
    length: 150

# 文章页
post:
  banner_img: /images/hero/01.jpg
  banner_img_height: 50
  meta:
    author:
      enable: true
    date:
      enable: true
    wordcount:
      enable: true
    readtime:
      enable: true
    category:
      enable: true
    tags:
      enable: true
  toc:
    enable: true
    number: true
    expand: all

# 归档页
archive:
  banner_img: /images/hero/02.jpg
  banner_img_height: 60

# 分类页
category:
  banner_img: /images/hero/03.jpg
  banner_img_height: 60

# 标签页
tag:
  banner_img: /images/hero/04.jpg
  banner_img_height: 60

# 关于信息
about:
  avatar: /images/avatar.jpg
  name: MIutopia
  intro: "云原生 & DevOps 技术笔记"
  banner_img: /images/hero/05.jpg
  banner_img_height: 60

# 页脚
footer:
  content: |
    <a href="https://github.com/MIutopia" target="_blank" rel="nofollow noopener"><span>MIutopia's Blog</span></a>
    <br/>
    <span>专注于云原生、DevOps、自动化运维技术分享</span>

# 评论
default:
  comments:
    enable: false

# 搜索
search:
  enable: true
  placeholder: 搜索文章

# 代码高亮
code:
  highlightjs:
    enable: true
    theme: atom-one-dark
  copy_btn: true

# 文章编辑链接
post_edit:
  enable: true
  url: https://github.com/MIutopia/hexo-blog-source/tree/main/source/_posts/

# 社交链接
social:
  enable: true
  links:
    - { icon: 'iconfont icon-github', link: 'https://github.com/MIutopia', title: 'GitHub' }
    - { icon: 'iconfont icon-twitter', link: 'https://twitter.com', title: 'Twitter' }

# Favicon
favicon: /images/favicon.svg
apple_touch_icon: /images/favicon.svg
