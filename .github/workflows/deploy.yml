name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npx hexo generate

      - name: Deploy to Vercel
        run: npx vercel deploy public/ --prod --token=${{ secrets.VERCEL_TOKEN }} --confirm
